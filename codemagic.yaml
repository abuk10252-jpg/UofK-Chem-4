workflows:
  uofk_chem_android_release:
    name: UofK Chem Android Release (Expo EAS APK)
    max_build_duration: 60
    environment:
      flutter: stable
      node: 18
      npm: 9
      vars:
        EXPO_PUBLIC_BACKEND_URL: "https://server-2-xpsh.onrender.com"
      groups:
        - expo_credentials

    cache:
      cache_paths:
        - $HOME/.npm
        - $HOME/.yarn
        - $HOME/.cache/eas

    scripts:
      - name: Install Node dependencies
        script: |
          npm install

      - name: Install EAS CLI
        script: |
          npm install -g eas-cli

      - name: EAS Login (optional لو ما بتستخدم حساب Expo تقدر تشيل الخطوة دي)
        script: |
          if [ -n "$EXPO_TOKEN" ]; then
            eas login --token $EXPO_TOKEN
          fi

      - name: Run EAS Build (Android APK)
        script: |
          eas build --platform android --profile production --non-interactive --output ./builds

    artifacts:
      - builds/**/*.apk

    android_signing:
      keystore_reference: "my-app-production-keystore"
