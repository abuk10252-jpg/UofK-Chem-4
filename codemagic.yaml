workflows:
  android-release:
    name: Android APK Build
    instance_type: linux_x2
    triggering:
      events:
        - push
      branch:
        include_patterns:
          - main
    environment:
      vars:
        APP_NAME: "UofK Chem"
        PACKAGE_NAME: "com.uofkchem.app"
        SERVER_URL: "https://server-2-xpsh.onrender.com"
    scripts:
      - name: Initialize React Native Project
        script: |
          npx react-native init UofKChem --skip-install
          cd UofKChem
          npm install
          cd ..
      - name: Setup Android Build
        script: |
          cd UofKChem/android
          chmod +x gradlew
          ./gradlew wrapper --gradle-version 8.2.1
          cd ../..
      - name: Build APK
        script: |
          cd UofKChem/android
          ./gradlew clean assembleRelease
          cd ../..
      - name: Copy APK
        script: |
          mkdir -p build_output
          find UofKChem/android -name "*.apk" -type f -exec cp {} build_output/ \;
    artifacts:
      - build_output/**
    publishing:
      email:
        recipients:
          - abuk10252@gmail.com
          
